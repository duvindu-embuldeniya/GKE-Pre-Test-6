name: CI - Build and Push Images

on:
  workflow_run:
    workflows: ["Terraform workflow"]
    types: [completed]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_REGION: ${{ secrets.GAR_REGION }}
  GAR_REPOSITORY_BACKEND: ${{ secrets.GAR_REPOSITORY_BACKEND }}
  GAR_REPOSITORY_FRONTEND: ${{ secrets.GAR_REPOSITORY_FRONTEND }}
  BACKEND_IMAGE: ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY_BACKEND }}
  FRONTEND_IMAGE: ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY_FRONTEND }}
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker $GAR_REGION-docker.pkg.dev --quiet

      - name: Build Backend Docker Image
        run: |
          docker build -t $BACKEND_IMAGE:$IMAGE_TAG ./backend

      - name: Push Backend Docker Image
        run: |
          docker push $BACKEND_IMAGE:$IMAGE_TAG

      - name: Build Frontend Docker Image
        run: |
          docker build -t $FRONTEND_IMAGE:$IMAGE_TAG ./frontend

      - name: Push Frontend Docker Image
        run: |
          docker push $FRONTEND_IMAGE:$IMAGE_TAG