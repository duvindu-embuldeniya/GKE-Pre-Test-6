name: CD - Deploy to GKE via Helm

on:
  workflow_run:
    workflows: ["CI - Build and Push Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (rollback)"
        required: true
        type: string

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_REGION: ${{ secrets.GKE_REGION }}
  GAR_REGION: ${{ secrets.GAR_REGION }}
  GAR_REPOSITORY_BACKEND: ${{ secrets.GAR_REPOSITORY_BACKEND }}
  GAR_REPOSITORY_FRONTEND: ${{ secrets.GAR_REPOSITORY_FRONTEND }}
  BACKEND_IMAGE: ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY_BACKEND }}
  FRONTEND_IMAGE: ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY_FRONTEND }}
  IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || github.event.workflow_run.run_number }}
  HELM_RELEASE: ${{ secrets.HELM_RELEASE }}
  HELM_CHART_PATH: ${{ secrets.HELM_CHART_PATH }}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Connect to GKE Cluster
        run: |
          gcloud container clusters get-credentials $GKE_CLUSTER \
            --region $GKE_REGION \
            --project $PROJECT_ID

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Upgrade / Install
        run: |
          helm upgrade --install $HELM_RELEASE $HELM_CHART_PATH \
            -f $HELM_CHART_PATH/values.yaml \
            --set backend.image.repository=$BACKEND_IMAGE \
            --set backend.image.tag=$IMAGE_TAG \
            --set frontend.image.repository=$FRONTEND_IMAGE \
            --set frontend.image.tag=$IMAGE_TAG \
            --atomic \
            --timeout 10m